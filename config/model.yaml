# 模型配置
# 各厂商可用模型清单，如需更多可查看对应模型官网
# openai: gpt-5.4, gpt-4.1等
# gemini: gemini-3.1 pro，gemini-2.5 falsh等
# qwen: qwen-max, qwen-plus, qwen-turbo, qwen-coder等
# deepseek: deepseek-chat, deepseek-reasoner等
# kimi: kimi-k2.5等

# 模型APIKEY配置，对应.env中密钥
# openai:OPENAI_APIKEY
# gemini:GEMINI_APIKEY
# qwen:QWEN_APIKEY
# deepseek:DEEPSEEK_APIKEY
# kimi:KIMI_APIKEY

# 主流程模型：作为 ReAct Agent 的底座
main:
  provider: qwen
  model: qwen-plus
  api_key_env: QWEN_APIKEY

# 文本生成模型：用于文本生成任务
text_generation:
  provider: qwen
  model: qwen-plus
  api_key_env: QWEN_APIKEY

# 元素提取模型：用于从文本中提取结构化信息
element_extraction:
  provider: qwen
  model: qwen-plus
  api_key_env: QWEN_APIKEY

# 代码生成模型：用于代码生成任务
code_generation:
  provider: deepseek
  model: deepseek-chat
  api_key_env: DEEPSEEK_APIKEY
